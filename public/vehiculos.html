<!DOCTYPE html>
<html lang="es" data-theme="default">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Catálogo EcoMóvil</title>
    <meta name="description"
        content="EcoMóvil es una empresa de vehículos eléctricos disponibles para prestamo. Esta página permite a nuestros empleados gestionar nuestra flota." />
    <meta name="keywords"
        content="transporte ecológico, vehículos eléctricos, movilidad sostenible, EcoMóvil, soluciones de transporte, movilidad verde" />
    <meta name="author" content="EcoMóvil" />
    <meta name="robots" content="index, follow" />
    <link rel="icon" href="img/Logo.svg" type="image/x-icon" />

    <!-- Enlaces a las hojas de estilo -->
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
</head>

<nav class="navbar navbar-expand-md navbar-light bg-light fixed-top">
    <div class="container-fluid">
        <a href="index.html" class="navbar-brand align-items-center" aria-label="Ir a la página de inicio de EcoMóvil"
            accesskey="I">
            <img src="img/Logo.svg" alt="Logo de EcoMóvil">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
            aria-controls="navbarContent" aria-expanded="false" aria-label="Alternar menú de navegación">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a href="index.html" class="nav-link" aria-label="Ir a la sección de Inicio"
                        accesskey="I">Inicio</a>
                </li>
                <li class="nav-item">
                    <a href="vehiculos.html" class="nav-link" aria-label="Ir a la sección de Vehículos"
                        accesskey="V">Vehículos</a>
                </li>
                <li class="nav-item">
                    <a href="reservas.html" class="nav-link" aria-label="Ir a la sección de Reservas"
                        accesskey="R">Reservas</a>
                </li>
                <li class="nav-item">
                    <a href="contacto.html" class="nav-link" aria-label="Ir a la sección de Contacto"
                        accesskey="C">Contacto</a>
                </li>
            </ul>
            <div class="dropdown">
                <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="languageDropdown"
                    data-bs-toggle="dropdown" aria-expanded="false" aria-label="Seleccionar idioma">
                    <span id="selectedLanguage">Español</span>
                </button>
                <ul class="dropdown-menu" aria-labelledby="languageDropdown">
                    <li><a class="dropdown-item" href="#" data-lang="es" aria-label="Cambiar a español">Español</a></li>
                    <li><a class="dropdown-item" href="#" data-lang="en" aria-label="Cambiar a inglés">English</a></li>
                </ul>
            </div>
            <div>
                <button id="toggleThemeBtn" class="btn btn-outline-secondary"
                    aria-label="Cambiar entre modo claro y alto contraste">
                    Activar alto contraste
                </button>
            </div>

            <div class="navbar-profile">
                <button id="usuarioBtn" class="btn p-0 d-flex align-items-center" aria-label="Abrir modal de usuario"
                    data-bs-toggle="modal" data-bs-target="#usuarioModal">
                    <img src="img/personas_1/Blank.jpeg" alt="Foto de perfil" class="rounded-circle me-2" width="40"
                        height="40">
                    <p class="d-block d-md-none mb-0">Mi perfil</p>
                </button>
            </div>
        </div>
    </div>
</nav>

<!-- Modal -->
<div class="modal fade" id="usuarioModal" tabindex="-1" aria-labelledby="usuarioModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="usuarioModalLabel">Mi cuenta</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
                <p>Aún no has iniciado sesión.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" class="btn btn-primary">Guardar cambios</button>
            </div>
        </div>
    </div>
</div>

<main aria-label="Contenido principal de la página">
    <h1>Catálogo de vehículos</h1>
    <table class="table table-striped" aria-label="Tabla de vehículos disponibles">
        <caption>
            Vehículos disponibles
        </caption>
        <thead>
            <tr>
                <th scope="col" aria-label="Columna de matrícula">Matrícula</th>
                <th scope="col" aria-label="Columna de marca">Marca</th>
                <th scope="col" aria-label="Columna de autonomía">Autonomía (km)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1234ABC</td>
                <td>Tesla Model 3</td>
                <td>450</td>
            </tr>
            <tr>
                <td>5678DEF</td>
                <td>Renault Zoe</td>
                <td>395</td>
            </tr>
            <tr>
                <td>9012GHI</td>
                <td>Nissan Leaf</td>
                <td>270</td>
            </tr>
        </tbody>
    </table>
</main>

</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/client.js"></script>

</html>
