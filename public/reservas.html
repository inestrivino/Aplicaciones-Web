<!DOCTYPE html>
<html lang="es" data-theme="default">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Reservar con EcoMóvil</title>
    <meta name="description"
        content="EcoMóvil es una empresa de vehículos eléctricos disponibles para prestamo. Esta página permite a nuestros empleados gestionar nuestra flota." />
    <meta name="keywords"
        content="transporte ecológico, vehículos eléctricos, movilidad sostenible, EcoMóvil, soluciones de transporte, movilidad verde" />
    <meta name="author" content="EcoMóvil" />
    <meta name="robots" content="index, follow" />
    <link rel="icon" href="img/Logo.svg" type="image/x-icon" />

    <!-- Enlaces a las hojas de estilo -->
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
</head>

<nav class="navbar navbar-expand-md navbar-light bg-light fixed-top">
    <div class="container-fluid">
        <a href="index.html" class="navbar-brand align-items-center" aria-label="Ir a la página de inicio de EcoMóvil"
            accesskey="I">
            <img src="img/Logo.svg" alt="Logo de EcoMóvil">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
            aria-controls="navbarContent" aria-expanded="false" aria-label="Alternar menú de navegación">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a href="index.html" class="nav-link" aria-label="Ir a la sección de Inicio"
                        accesskey="I">Inicio</a>
                </li>
                <li class="nav-item">
                    <a href="vehiculos.html" class="nav-link" aria-label="Ir a la sección de Vehículos"
                        accesskey="V">Vehículos</a>
                </li>
                <li class="nav-item">
                    <a href="reservas.html" class="nav-link" aria-label="Ir a la sección de Reservas"
                        accesskey="R">Reservas</a>
                </li>
                <li class="nav-item">
                    <a href="contacto.html" class="nav-link" aria-label="Ir a la sección de Contacto"
                        accesskey="C">Contacto</a>
                </li>
            </ul>
            <div class="dropdown">
                <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="languageDropdown"
                    data-bs-toggle="dropdown" aria-expanded="false" aria-label="Seleccionar idioma">
                    <span id="selectedLanguage">Español</span>
                </button>
                <ul class="dropdown-menu" aria-labelledby="languageDropdown">
                    <li><a class="dropdown-item" href="#" data-lang="es" aria-label="Cambiar a español">Español</a></li>
                    <li><a class="dropdown-item" href="#" data-lang="en" aria-label="Cambiar a inglés">English</a></li>
                </ul>
            </div>
            <div>
                <button id="toggleThemeBtn" class="btn btn-outline-secondary"
                    aria-label="Cambiar entre modo claro y alto contraste">
                    Activar alto contraste
                </button>
            </div>

            <div class="navbar-profile">
                <button id="usuarioBtn" class="btn p-0 d-flex align-items-center" aria-label="Abrir modal de usuario"
                    data-bs-toggle="modal" data-bs-target="#usuarioModal">
                    <img src="img/personas_1/Blank.jpeg" alt="Foto de perfil" class="rounded-circle me-2" width="40"
                        height="40">
                    <p class="d-block d-md-none mb-0">Mi perfil</p>
                </button>
            </div>
        </div>
    </div>
</nav>

<!-- Modal -->
<div class="modal fade" id="usuarioModal" tabindex="-1" aria-labelledby="usuarioModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="usuarioModalLabel">Mi cuenta</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
                <p>Aún no has iniciado sesión.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" class="btn btn-primary">Guardar cambios</button>
            </div>
        </div>
    </div>
</div>

<main aria-label="Contenido principal de la página">
    <h1>Reservar vehículos</h1>
    <form class="needs-validation" aria-label="Formulario de reserva de vehículos">
        <fieldset aria-label="Datos del usuario">
            <legend>Datos del usuario</legend>
            <div>
                <label for="nombre-reserva" class="form-label">Nombre completo</label>
                <input type="text" class="form-control" id="nombre-reserva" aria-required="true" required />
            </div>
            <div>
                <label for="email-reserva" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="email-reserva" aria-required="true" required />
            </div>
            <div>
                <label for="telefono" class="form-label">Teléfono (opcional)</label>
                <input type="tel" class="form-control" id="telefono" pattern="[0-9]{9}"
                    title="Introduce 9 dígitos sin espacios ni guiones" />
                <div class="form-text">Formato: 123456789</div>
            </div>
        </fieldset>
        <fieldset aria-label="Detalles de la reserva">
            <legend>Detalles de la reserva</legend>
            <div>
                <label for="vehiculo" class="form-label">Vehículo</label>
                <select class="form-select" id="vehiculo" aria-required="true" required
                    aria-label="Seleccionar vehículo">
                    <option selected disabled value="">
                        Seleccione un vehículo
                    </option>
                    <option value="1234ABC">Tesla Model 3 (1234ABC)</option>
                    <option value="5678DEF">Renault Zoe (5678DEF)</option>
                    <option value="9012GHI">Nissan Leaf (9012GHI)</option>
                </select>
            </div>
            <div>
                <label for="inicio" class="form-label">Inicio de reserva</label>
                <input type="datetime-local" class="form-control" id="inicioFecha" aria-required="true" required
                    aria-label="Seleccionar fecha y hora de inicio" />
            </div>
            <div>
                <label for="fin" class="form-label">Fin de reserva</label>
                <input type="datetime-local" class="form-control" id="finFecha" aria-required="true" required
                    aria-label="Seleccionar fecha y hora de fin" />
            </div>
        </fieldset>
        <div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="condiciones" aria-required="true" required
                    aria-label="Aceptar condiciones de uso" />
                <label class="form-check-label" for="condiciones">
                    Acepto las condiciones de uso
                </label>
            </div>
        </div>
        <div aria-label="Botones del formulario de reserva">
            <button type="submit" class="btn btn-primary" aria-label="Enviar formulario de reserva">
                Enviar reserva
            </button>
            <button type="reset" class="btn btn-secondary" aria-label="Limpiar formulario de reserva">
                Limpiar formulario
            </button>
        </div>
    </form>
</main>

</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/client.js"></script>

</html>
