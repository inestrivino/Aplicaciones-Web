<!DOCTYPE html>
<html lang="es" data-theme="default">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>EcoMóvil - Gestión de Flota de Vehículos Eléctricos</title>
    <meta name="description"
        content="EcoMóvil es una empresa de vehículos eléctricos disponibles para prestamo. Esta página permite a nuestros empleados gestionar nuestra flota." />
    <meta name="keywords"
        content="transporte ecológico, vehículos eléctricos, movilidad sostenible, EcoMóvil, soluciones de transporte, movilidad verde" />
    <meta name="author" content="EcoMóvil" />
    <meta name="robots" content="index, follow" />
    <link rel="icon" href="img/Logo.svg" type="image/x-icon" />

    <!-- Enlaces a las hojas de estilo -->
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
</head>

<nav class="navbar navbar-expand-md navbar-light bg-light fixed-top">
    <div class="container-fluid">
        <a href="index.html" class="navbar-brand align-items-center" aria-label="Ir a la página de inicio de EcoMóvil"
            accesskey="I">
            <img src="img/Logo.svg" alt="Logo de EcoMóvil">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
            aria-controls="navbarContent" aria-expanded="false" aria-label="Alternar menú de navegación">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a href="index.html" class="nav-link" aria-label="Ir a la sección de Inicio" accesskey="I">Inicio</a>
                </li>
                <li class="nav-item">
                    <a href="vehiculos.html" class="nav-link" aria-label="Ir a la sección de Vehículos"
                        accesskey="V">Vehículos</a>
                </li>
                <li class="nav-item">
                    <a href="reservas.html" class="nav-link" aria-label="Ir a la sección de Reservas"
                        accesskey="R">Reservas</a>
                </li>
                <li class="nav-item">
                    <a href="contacto.html" class="nav-link" aria-label="Ir a la sección de Contacto"
                        accesskey="C">Contacto</a>
                </li>
            </ul>
            <div class="dropdown">
                <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="languageDropdown"
                    data-bs-toggle="dropdown" aria-expanded="false" aria-label="Seleccionar idioma">
                    <span id="selectedLanguage">Español</span>
                </button>
                <ul class="dropdown-menu" aria-labelledby="languageDropdown">
                    <li><a class="dropdown-item" href="#" data-lang="es" aria-label="Cambiar a español">Español</a></li>
                    <li><a class="dropdown-item" href="#" data-lang="en" aria-label="Cambiar a inglés">English</a></li>
                </ul>
            </div>
            <div>
                <button id="toggleThemeBtn" class="btn btn-outline-secondary"
                    aria-label="Cambiar entre modo claro y alto contraste">
                    Activar alto contraste
                </button>
            </div>
        </div>
</nav>

<main aria-label="Contenido principal">
    <h1>Contacto</h1>
        <form class="needs-validation" aria-label="Formulario de contacto">
            <fieldset aria-label="Campos del formulario de contacto">
                <div class="form-group">
                    <label for="nombre-contacto" class="form-label">Nombre:</label>
                    <input type="text" id="nombre-contacto" name="nombre" required placeholder="Nombre"
                        class="form-control" aria-required="true" aria-label="Introducir nombre">
                </div>
                <div class="form-group">
                    <label for="email-contacto" class="form-label">Email:</label>
                    <input type="email" id="email-contacto" name="email" required placeholder="Email"
                        class="form-control" aria-required="true" aria-label="Introducir correo electrónico">
                </div>
                <div class="form-group">
                    <label for="mensaje" class="form-label">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="4" required placeholder="Escribe tu mensaje..."
                        class="form-control" aria-required="true" aria-label="Introducir mensaje"></textarea>
                </div>
            </fieldset>
            <button type="submit" class="btn btn-primary" aria-label="Enviar formulario de contacto">
                Enviar
            </button>
        </form>
</main>
</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/client.js"></script>

</html>
